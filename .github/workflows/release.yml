name: Release
 
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 2026.04.19)'
        required: true
      notes:
        description: 'Release notes'
        required: false
        type: string
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
 
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
 
    steps:
      - uses: actions/checkout@v4
 
      # ---- Build the app ----
      - uses: oven-sh/setup-bun@v2
 
      - run: bun install --frozen-lockfile
 
      - run: bun run build
 
      # ---- Zip for non-Docker users ----
      - name: Create release zip
        run: |
          mkdir -p release-staging
          cp -r build release-staging/
          cp -r node_modules release-staging/
          cp package.json release-staging/
          cd release-staging
          zip -r ../ak-automated-uploader-${{ inputs.version }}.zip .
 
      # ---- Docker image ----
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest
 
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
 
      # ---- GitHub Release ----
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.version }}
          body: ${{ inputs.notes }}
          files: ak-automated-uploader-${{ inputs.version }}.zip
